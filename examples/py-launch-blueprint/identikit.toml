# identikit.toml for smorinlabs/py-launch-blueprint
#
# Translated from py-launch-blueprint/init/manifest.toml — the real migration
# scope, expressed in identikit's config. Drop this at the repo root and run
# `identikit init` to replace the bespoke init/ system.
#
# Regenerate/verify the [[replace]] file lists with:  identikit discover --summary

# ── identity ─────────────────────────────────────────────────────────────────

[identity.package_name]
value    = "py_launch_blueprint"
validate = "python_identifier"
prompt   = "Python package name (snake_case)"
derive   = "repo_name|snake"

[identity.repo_name]
value    = "py-launch-blueprint"
validate = "repo_name"
prompt   = "repo name (kebab-case)"
derive   = "origin.repo"

[identity.command_name]
value    = "py-projects"
validate = "command_name"
prompt   = "CLI command name (kebab-case)"
derive   = "repo_name"

[identity.owner]
value    = "smorinlabs"
validate = "github_owner"
prompt   = "GitHub owner (user or org)"
derive   = "origin.owner"

[identity.author]
value    = "Steve Morin"
validate = ""
prompt   = "author name"
derive   = "git.user.name"

[identity.email]
value    = "steve.morin@gmail.com"
validate = "email"
prompt   = "author email"
derive   = "git.user.email"

# ── replace: structured (TOML — tomlkit, comment-preserving) ─────────────────

[[replace]]
field = "package_name"
files = ["pyproject.toml"]
mode  = "structured"

[[replace]]
field = "repo_name"
files = [".gitleaks.toml", "pyproject.toml"]
mode  = "structured"

[[replace]]
field = "command_name"
files = ["pyproject.toml"]
mode  = "structured"

[[replace]]
field = "owner"
files = ["pyproject.toml"]
mode  = "structured"

[[replace]]
field = "email"
files = ["pyproject.toml"]
mode  = "structured"

[[replace]]
field = "author"
files = [".taplo.toml", "pyproject.toml"]
mode  = "structured"

