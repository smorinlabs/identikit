# NOTE: CHANGELOG.md carries 96× repo_name + 96× owner from historical release
# entries that must NOT be rewritten — deliberately omitted (would be a [[remove]]
# / reset in a real migration, not a replace). Same reasoning the source manifest
# flags. Audit with `identikit doctor` and reset the changelog separately.

# ── rename ───────────────────────────────────────────────────────────────────

[[rename]]
from = "assets/images/logos/py_launch_blueprint_logo_1024x1024.png"
to   = "assets/images/logos/{package_name}_logo_1024x1024.png"

[[rename]]
from = "assets/images/logos/py_launch_blueprint_logo_150x150.png"
to   = "assets/images/logos/{package_name}_logo_150x150.png"

[[rename]]
from = "assets/images/logos/py_launch_blueprint_logo_100x100.png"
to   = "assets/images/logos/{package_name}_logo_100x100.png"

[[rename]]
from = "docs/source/_static/py_launch_blueprint_logo_100x100.png"
to   = "docs/source/_static/{package_name}_logo_100x100.png"

[[rename]]
from = "py_launch_blueprint"
to   = "{package_name}"

# ── remove (template-only / project-specific artifacts) ──────────────────────

[[remove]]
path   = ".github/workflows/blueprint-guard.yml"
reason = "guard CI is template-only"

[[remove]]
path   = ".github/workflows/update-contributors.yml"
reason = "contributor automation is project-specific"

[[remove]]
path   = ".contributors.yml"
reason = "contributor config is project-specific"

[[remove]]
path   = ".contributors.jsonl"
reason = "contributor state is project-specific"

[[remove]]
path   = "CONTRIBUTORS.md"
reason = "generated contributors file is project-specific"

[[remove]]
path   = "init"
reason = "the bespoke init/ system is replaced by identikit"

[[remove]]
path   = "skill"
reason = "agent skill is template-only tooling"

# ── regenerate (lockfiles embed the project name) ────────────────────────────

[[regenerate]]
path    = "uv.lock"
command = ["uv", "lock"]

[[regenerate]]
path    = "bun.lock"
command = ["bun", "install"]

# ── guard + prune ────────────────────────────────────────────────────────────

[guard]
skip_if_origin = ["smorinlabs/py-launch-blueprint", "smorin/py-launch-blueprint"]
block          = ["build", "publish"]

[prune]
paths = ["identikit.toml", "guard.sh"]
