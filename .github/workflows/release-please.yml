# Release-please — opens a release PR on push to main; sync-uv-lock keeps
# uv.lock current. Mirrors py-launch-blueprint (ADR-05). Auth uses one of two
# mechanisms that BOTH open PRs and trigger downstream workflows (publish.yml):
#   1. GitHub App (preferred): RELEASE_PLEASE_APP_ID + RELEASE_PLEASE_PRIVATE_KEY
#   2. Fallback PAT: RELEASE_PLEASE_APP_TOKEN (fine-grained, Contents + PRs: write)
# GITHUB_TOKEN is intentionally NOT a fallback (never triggers downstream runs).

name: release-please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RP_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - name: Mint release-please app token
        id: app-token
        if: ${{ env.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: release-please
        id: rp
        uses: googleapis/release-please-action@v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RELEASE_PLEASE_APP_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-uv-lock:
    name: sync-uv-lock
    needs: release-please
    if: ${{ needs.release-please.outputs.pr != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RP_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    steps:
      - name: Mint release-please app token
        id: app-token
        if: ${{ env.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: Checkout release PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token || secrets.RELEASE_PLEASE_APP_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Regenerate uv.lock
        run: uv lock

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if ! git diff --quiet uv.lock; then
            git add uv.lock
            git commit -m "chore: sync uv.lock"
            git push
          else
            echo "uv.lock already in sync"
          fi
