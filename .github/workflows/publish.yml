# Publish — OIDC Trusted Publishing to PyPI on v* tags. Mirrors
# py-launch-blueprint/publish.yml (ADR-07). No API tokens: the `pypi`
# environment + id-token:write authorizes the upload.

name: publish

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight publish

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for the ancestor check

      - name: Verify tag is reachable from main
        run: |
          set -euo pipefail
          git fetch origin main:main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" main; then
            echo "FAIL: tag commit ${GITHUB_SHA} is not on main" >&2
            exit 1
          fi
          echo "PASS: tag on main"

      - name: Verify [project] version matches tag
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${GIT_TAG#v}"
          PROJECT_VERSION=$(python3 -c \
            "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${TAG_VERSION}" != "${PROJECT_VERSION}" ]; then
            echo "FAIL: tag ${TAG_VERSION} != pyproject ${PROJECT_VERSION}" >&2
            exit 1
          fi
          echo "PASS: tag matches pyproject version (${TAG_VERSION})"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist + wheel
        run: uv build

      - name: Upload dist/ artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: publish-pypi
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Trusted Publishing only needs this
    steps:
      - name: Download dist/
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/
